[profile.default]
src = "src"
out = "out"
solc_version = "0.8.24"
libs = ["lib"]


remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]


optimizer = true
optimizer_runs = 1000


evm_version = "cancun" 


[rpc_endpoints]
amoy = "${AMOY_RPC_URL}"


[etherscan]
amoy = { key = "${POLYGONSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=80002" }


[fmt]
bracket_spacing = true
int_types = "long"
line_length = 100
quote_style = "double"
tab_width = 4


[invariant]
runs = 256
depth = 15